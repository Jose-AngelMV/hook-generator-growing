<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hook Generator — Growing Inmobiliario</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0f;
    color: #f0f0f0;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container { max-width: 720px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 2.5rem; }
  .logo {
    display: inline-flex; align-items: center; gap: 10px;
    background: #1a1a2e; border: 1px solid #2a2a4a;
    border-radius: 12px; padding: 10px 20px;
    margin-bottom: 1.5rem;
  }
  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: #e94560; }
  .logo-text { font-size: 13px; font-weight: 600; color: #e94560; letter-spacing: 0.05em; text-transform: uppercase; }
  h1 { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
  .subtitle { font-size: 15px; color: #888; }
  .card {
    background: #111120; border: 1px solid #1e1e35;
    border-radius: 16px; padding: 1.5rem; margin-bottom: 1.25rem;
  }
  .card-label {
    font-size: 11px; font-weight: 600; color: #e94560;
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 0.75rem;
  }
  .format-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .format-btn {
    background: #1a1a2e; border: 1px solid #2a2a4a;
    border-radius: 10px; padding: 10px 8px;
    cursor: pointer; text-align: center;
    transition: all 0.15s;
    color: #aaa; font-size: 13px; font-weight: 500;
  }
  .format-btn:hover { border-color: #e94560; color: #fff; }
  .format-btn.active { background: #1e0a14; border-color: #e94560; color: #e94560; }
  .format-icon { font-size: 18px; margin-bottom: 4px; }
  textarea {
    width: 100%; background: #0d0d1a;
    border: 1px solid #1e1e35; border-radius: 10px;
    padding: 14px; color: #f0f0f0;
    font-size: 14px; line-height: 1.6;
    resize: vertical; min-height: 120px;
    font-family: inherit; transition: border-color 0.15s;
  }
  textarea:focus { outline: none; border-color: #e94560; }
  textarea::placeholder { color: #444; }
  .generate-btn {
    width: 100%; background: #e94560;
    border: none; border-radius: 12px;
    padding: 16px; color: #fff;
    font-size: 16px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .generate-btn:hover { background: #d63a54; transform: translateY(-1px); }
  .generate-btn:active { transform: translateY(0); }
  .generate-btn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.7s linear infinite; display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .results { margin-top: 1.5rem; }
  .result-label {
    font-size: 11px; font-weight: 600; color: #555;
    letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 1rem;
  }
  .hook-card {
    background: #111120; border: 1px solid #1e1e35;
    border-radius: 14px; padding: 1.25rem;
    margin-bottom: 1rem; position: relative;
  }
  .hook-number {
    position: absolute; top: -10px; left: 16px;
    background: #e94560; color: #fff;
    font-size: 11px; font-weight: 700;
    padding: 2px 10px; border-radius: 20px;
  }
  .hook-section { margin-bottom: 1rem; }
  .hook-section:last-child { margin-bottom: 0; }
  .hook-section-label {
    font-size: 10px; font-weight: 600; color: #555;
    letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px;
  }
  .hook-texto-arriba {
    font-size: 16px; font-weight: 700; color: #fff; line-height: 1.4;
    background: #0d0d1a; border-left: 3px solid #e94560;
    padding: 10px 14px; border-radius: 0 8px 8px 0;
  }
  .hook-arranque {
    font-size: 14px; color: #ccc; line-height: 1.6; font-style: italic;
    background: #0d0d1a; padding: 10px 14px; border-radius: 8px;
  }
  .copy-btn {
    background: transparent; border: 1px solid #2a2a4a;
    border-radius: 8px; padding: 6px 12px;
    color: #888; font-size: 12px; cursor: pointer;
    transition: all 0.15s; margin-top: 10px;
  }
  .copy-btn:hover { border-color: #e94560; color: #e94560; }
  .copy-btn.copied { border-color: #2ecc71; color: #2ecc71; }
  .error-msg {
    background: #1e0a14; border: 1px solid #e94560;
    border-radius: 10px; padding: 1rem;
    color: #e94560; font-size: 14px; margin-top: 1rem; display: none;
  }
  .tip {
    font-size: 12px; color: #444; text-align: center;
    margin-top: 1.5rem; line-height: 1.5;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">Growing Inmobiliario</span>
    </div>
    <h1>Hook Generator</h1>
    <p class="subtitle">Pega el contexto del vídeo y genera 3 hooks que paran el scroll</p>
  </div>

  <div class="card">
    <div class="card-label">📱 Formato del reel</div>
    <div class="format-grid">
      <button class="format-btn active" onclick="selectFormat(this, 'talking')">
        <div class="format-icon">🎙️</div>
        Talking head
      </button>
      <button class="format-btn" onclick="selectFormat(this, 'llamada')">
        <div class="format-icon">📞</div>
        Llamada real
      </button>
      <button class="format-btn" onclick="selectFormat(this, 'stock')">
        <div class="format-icon">🎬</div>
        Stock de Pol
      </button>
    </div>
  </div>

  <div class="card">
    <div class="card-label">🎯 Contexto del vídeo</div>
    <textarea id="contexto" placeholder="Pega aquí la transcripción, el tema del vídeo o el gancho que quieres mejorar..."></textarea>
  </div>

  <button class="generate-btn" id="generateBtn" onclick="generateHooks()">
    <div class="spinner" id="spinner"></div>
    <span id="btnText">Generar 3 hooks</span>
  </button>

  <div class="error-msg" id="errorMsg"></div>
  <div class="results" id="results"></div>
  <p class="tip">Los hooks se generan con el contexto completo de marca de Pol Morado y Growing Inmobiliario</p>
</div>

<script>
let selectedFormat = 'talking';

function selectFormat(btn, format) {
  document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedFormat = format;
}

async function generateHooks() {
  const contexto = document.getElementById('contexto').value.trim();
  if (!contexto) { showError('Pega el contexto del vídeo antes de generar.'); return; }

  const btn = document.getElementById('generateBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  const errorMsg = document.getElementById('errorMsg');
  const results = document.getElementById('results');

  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.textContent = 'Generando...';
  errorMsg.style.display = 'none';
  results.innerHTML = '';

  try {
    const res = await fetch('/api/hooks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contexto, formato: selectedFormat })
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    renderHooks(data.result);
  } catch {
    showError('Error al generar los hooks. Inténtalo de nuevo.');
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent = 'Generar 3 hooks';
  }
}

function renderHooks(text) {
  const results = document.getElementById('results');
  const hooks = [];
  for (let i = 1; i <= 3; i++) {
    const textoMatch = text.match(new RegExp(`HOOK_${i}_TEXTO:\\s*(.+)`));
    const arranqueMatch = text.match(new RegExp(`HOOK_${i}_ARRANQUE:\\s*([\\s\\S]+?)(?=HOOK_${i+1}_TEXTO:|$)`));
    if (textoMatch && arranqueMatch) {
      hooks.push({
        texto: textoMatch[1].trim().replace(/^["*_]|["*_]$/g, ''),
        arranque: arranqueMatch[1].trim().replace(/^["*_]|["*_]$/g, '')
      });
    }
  }
  if (!hooks.length) { showError('No se pudieron generar los hooks. Inténtalo de nuevo.'); return; }

  results.innerHTML = '<div class="result-label">✦ 3 hooks generados</div>';
  hooks.forEach((hook, i) => {
    const card = document.createElement('div');
    card.className = 'hook-card';
    card.innerHTML = `
      <div class="hook-number">HOOK ${i + 1}</div>
      <div class="hook-section">
        <div class="hook-section-label">Texto arriba</div>
        <div class="hook-texto-arriba">${hook.texto}</div>
      </div>
      <div class="hook-section">
        <div class="hook-section-label">Pol arranca</div>
        <div class="hook-arranque">"${hook.arranque}"</div>
      </div>
      <button class="copy-btn" onclick="copyHook(this, \`${hook.texto.replace(/`/g, '\\`')}\`, \`${hook.arranque.replace(/`/g, '\\`')}\`)">Copiar hook</button>
    `;
    results.appendChild(card);
  });
}

function copyHook(btn, texto, arranque) {
  navigator.clipboard.writeText(`TEXTO ARRIBA:\n${texto}\n\nPOL ARRANCA:\n"${arranque}"`).then(() => {
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar hook'; btn.classList.remove('copied'); }, 2000);
  });
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg; el.style.display = 'block';
}
</script>
</body>
</html>
